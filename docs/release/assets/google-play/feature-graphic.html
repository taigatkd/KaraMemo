<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1024, initial-scale=1">
  <title>KaraMemo Feature Graphic</title>
  <style>
    :root {
      --bg-start: #fff8f1;
      --bg-end: #f5d873;
      --ink: #24314f;
      --subtle: #56647f;
      --card: rgba(255, 252, 246, 0.92);
      --chip: rgba(255, 250, 238, 0.78);
      --shadow: rgba(32, 41, 66, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 1024px;
      height: 500px;
      overflow: hidden;
      background: linear-gradient(108deg, var(--bg-start) 0%, #fff2cf 45%, var(--bg-end) 100%);
      color: var(--ink);
      font-family: "Segoe UI", "Yu Gothic UI", "Hiragino Sans", sans-serif;
    }

    body {
      position: relative;
      isolation: isolate;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 360px;
      height: 260px;
      left: -52px;
      top: -36px;
      background: rgba(255, 255, 255, 0.52);
    }

    body::after {
      width: 300px;
      height: 180px;
      left: 292px;
      bottom: 40px;
      background: rgba(255, 190, 73, 0.18);
    }

    .blob {
      position: absolute;
      border-radius: 999px;
      z-index: 0;
      pointer-events: none;
    }

    .blob.blob-a {
      left: 144px;
      bottom: 22px;
      width: 244px;
      height: 140px;
      background: rgba(35, 49, 79, 0.14);
    }

    .arc {
      position: absolute;
      border: 2px solid rgba(255, 255, 255, 0.6);
      border-color: rgba(255, 255, 255, 0.6) transparent transparent transparent;
      border-radius: 999px 999px 0 0;
      z-index: 0;
      pointer-events: none;
    }

    .arc.arc-a {
      width: 108px;
      height: 56px;
      left: 478px;
      top: 22px;
      transform: rotate(-6deg);
    }

    .arc.arc-b {
      width: 98px;
      height: 52px;
      right: 30px;
      top: 24px;
      transform: rotate(18deg);
    }

    .layout {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 430px 1fr;
      width: 100%;
      height: 100%;
      padding: 56px 52px 48px;
      gap: 24px;
    }

    .copy {
      align-self: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 22px;
    }

    .brand img {
      width: 92px;
      height: 92px;
      border-radius: 22px;
      box-shadow: 0 14px 28px rgba(24, 39, 71, 0.16);
    }

    .brand-title {
      margin: 0;
      font-size: 56px;
      line-height: 0.95;
      letter-spacing: -0.03em;
      font-weight: 800;
    }

    .subcopy {
      margin: 0 0 12px;
      font-size: 26px;
      line-height: 1.35;
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    .detail {
      margin: 0 0 28px;
      font-size: 19px;
      line-height: 1.5;
      color: var(--subtle);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      padding: 8px 14px 9px;
      border-radius: 999px;
      background: var(--chip);
      border: 1px solid rgba(36, 49, 79, 0.14);
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
      box-shadow: 0 8px 18px rgba(31, 43, 69, 0.08);
    }

    .shots {
      position: relative;
      height: 100%;
      min-width: 0;
    }

    .shot {
      position: absolute;
      overflow: hidden;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.75);
      background: var(--card);
      box-shadow: 0 22px 42px var(--shadow);
    }

    .shot img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }

    .shot.left {
      width: 150px;
      height: 338px;
      left: 44px;
      top: 58px;
      transform: rotate(-7deg);
    }

    .shot.center {
      width: 188px;
      height: 424px;
      left: 168px;
      top: 8px;
      transform: rotate(-1.5deg);
    }

    .shot.right {
      width: 150px;
      height: 338px;
      left: 328px;
      top: 76px;
      transform: rotate(7deg);
    }
  </style>
</head>
<body>
  <div class="blob blob-a"></div>
  <div class="arc arc-a"></div>
  <div class="arc arc-b"></div>

  <main class="layout">
    <section class="copy">
      <div class="brand">
        <img src="../../../../app/src/main/res/mipmap-xxxhdpi/ic_launcher.png" alt="KaraMemo">
        <h1 class="brand-title">KaraMemo</h1>
      </div>
      <p class="subcopy">曲・キー・プレイリストを、ひとつに整理。</p>
      <p class="detail">次に歌いたい曲をすぐ見つけて、カラオケ中のメモも軽くまとめられます。</p>
      <div class="chips" aria-label="Features">
        <span class="chip">曲一覧</span>
        <span class="chip">アーティスト整理</span>
        <span class="chip">プレイリスト管理</span>
      </div>
    </section>

    <section class="shots" aria-label="App Screenshots">
      <figure class="shot left">
        <img src="./ja-JP/phone-02-artist-list.png" alt="Artist list">
      </figure>
      <figure class="shot center">
        <img src="./ja-JP/phone-01-song-list.png" alt="Song list">
      </figure>
      <figure class="shot right">
        <img src="./ja-JP/phone-03-playlist-list.png" alt="Playlist list">
      </figure>
    </section>
  </main>
</body>
</html>
